<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Bot animated render harness</title>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = { autoplay: 'on', unmuteOverlay: 'hidden', warnOnUnsupportedContent: false, splashScreen: false };
</script>
<script src="/ruffle/ruffle.js"></script>
<script src="/rigAvatar.js"></script>
</head>
<body style="margin:0">
<script>
// Same static crop + Canvas-2D name/guild header as renderBotStatic.html,
// just repeated per captured frame so a weapon's own native shine/glow loop
// (baked into its SWF timeline, not anything we animate ourselves) actually
// plays instead of freezing on frame 1. No rig-slicing/joint puppeteering
// here — that's the animation approach that looked "off" and was dropped.
window.__renderReady = false;
window.__renderError = null;
window.__renderFrames = null; // array of PNG data URLs, same dimensions

// Flood-fills the connected alpha region touching (seedX, seedY) — searching
// outward for the nearest alpha pixel first, since the seed itself (e.g. a
// frame-0 bbox centroid) can land on a transparent gap in a later frame.
// Returns both the region's bbox AND its actual pixel membership as a mask
// local to [x0,x1)x[y0,y1) — the caller needs real membership, not just a
// bbox, because a blob that's merged with unrelated nearby content (see the
// pet-extraction comment below) has a bounding box that over-includes that
// content; only per-pixel masking avoids scooping it up too.
function floodFillBlobMask(alphaAt, w, h, x0, y0, x1, y1, seedX, seedY) {
  let sx = Math.round(Math.max(x0, Math.min(x1 - 1, seedX)));
  let sy = Math.round(Math.max(y0, Math.min(y1 - 1, seedY)));
  if (!alphaAt(sx, sy)) {
    let found = false;
    for (let r = 1; r <= Math.max(x1 - x0, y1 - y0) && !found; r++) {
      for (let dy = -r; dy <= r && !found; dy++) {
        for (let dx = -r; dx <= r && !found; dx++) {
          const nx = sx + dx, ny = sy + dy;
          if (nx < x0 || nx >= x1 || ny < y0 || ny >= y1) continue;
          if (alphaAt(nx, ny)) { sx = nx; sy = ny; found = true; break; }
        }
      }
    }
    if (!found) return null;
  }
  const sw = x1 - x0, sh = y1 - y0;
  const mask = new Uint8Array(sw * sh);
  const stack = [sx, sy];
  mask[(sy - y0) * sw + (sx - x0)] = 1;
  let minX = sx, minY = sy, maxX = sx, maxY = sy;
  while (stack.length) {
    const cy = stack.pop(), cx = stack.pop();
    if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
    if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const nx = cx + dx, ny = cy + dy;
        if (nx < x0 || nx >= x1 || ny < y0 || ny >= y1) continue;
        const idx = (ny - y0) * sw + (nx - x0);
        if (mask[idx] || !alphaAt(nx, ny)) continue;
        mask[idx] = 1;
        stack.push(nx, ny);
      }
    }
  }
  return { mask, minX, minY, maxX, maxY };
}

function alphaBBox(data, w, h, x0, y0, x1, y1, threshold = 10) {
  let minX = x1, minY = y1, maxX = x0, maxY = y0;
  for (let y = y0; y < y1; y++) {
    for (let x = x0; x < x1; x++) {
      if (data[(y * w + x) * 4 + 3] > threshold) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  return { minX, minY, maxX, maxY };
}

async function run() {
  try {
    const params = new URLSearchParams(location.search);
    const username = params.get('username');
    if (!username) throw new Error('no username in query string');
    const textStyle = RigAvatar.getTextStyle(params.get('style'));
    const colorTheme = RigAvatar.getColorTheme(params.get('color'));

    const res = await fetch('/api/avatar?username=' + encodeURIComponent(username));
    if (!res.ok) throw new Error('avatar API ' + res.status);
    const { flashvars: gear } = await res.json();

    // Sampling at Ruffle's own native 24fps (rather than the earlier 10fps)
    // so the weapon's shine motion reads as smooth instead of choppy —
    // still ~2s total, just 48 frames instead of 20 to cover it.
    const FRAME_COUNT = 48, INTERVAL_MS = Math.round(1000 / 24);
    const { frames, width: w, height: h, ready } = await RigAvatar.captureAnimatedFramesDualKey(gear, { frameCount: FRAME_COUNT, intervalMs: INTERVAL_MS });
    if (!ready) throw new Error('character never became ready (gear failed to load in time)');
    if (!frames.length) throw new Error('no frames captured');

    // Read the head-position beacons (see RigAvatar.readHeadInfoBeacons)
    // BEFORE blanking the reserved corner below — they live in that same
    // corner (encoded as plain RGB in two small swatches, same reserved
    // space the ready beacon already occupies), not drawn on the character
    // at all. An earlier approach drew a visible marker directly on the
    // character and cleared it after reading its position — abandoned:
    // dual-key capture never actually sees whatever real content an opaque
    // marker occludes, so clearing it afterward left a genuine hole rather
    // than recovering anything (confirmed on Ryuu, where the marker
    // overlapped his cape's own solid shape). The beacons are children of
    // the ROOT at fixed screen coordinates — unlike a marker parented under
    // this.rig.head, they don't move with idle-bounce, so one read (any
    // frame; frame 0 here) is enough — no per-frame re-detection needed.
    const headInfo = RigAvatar.readHeadInfoBeacons(frames[0].data, w, h);

    // Blank the ready-beacon corner (and both head-info swatches, which
    // live in the same reserved region) on every frame before scanning
    // bounds, same reasoning as the static harness.
    for (const img of frames) {
      const d = img.data;
      for (let y = 0; y < 100; y++) {
        for (let x = 0; x < 100; x++) { d[(y * w + x) * 4 + 3] = 0; }
      }
    }

    // Union the alpha bounding box (and the head-slice sub-box used for text
    // centering) ACROSS ALL FRAMES, not per-frame — a per-frame box would
    // jitter the crop/text position slightly as shine pixels flicker near
    // the silhouette edge from frame to frame.
    // Stricter threshold than the default 10 — the bigger stage (added so
    // oversized cosmetics have room to not get clipped) also gives faint,
    // near-invisible tails (e.g. a weapon's fading motion-trail glow, alpha
    // ~11-20) room to fully extend instead of being cut off by the old
    // cramped stage edge, which was inflating the crop far past anything a
    // viewer actually perceives as "part of the character". Real content
    // edges run well above this even where they fade, so this doesn't clip
    // anything genuinely visible.
    const OUTER_BBOX_ALPHA_THRESHOLD = 40;
    let minX = w, minY = h, maxX = 0, maxY = 0;
    for (const img of frames) {
      const b = alphaBBox(img.data, w, h, 0, 0, w, h, OUTER_BBOX_ALPHA_THRESHOLD);
      if (b.maxX > b.minX && b.maxY > b.minY) {
        minX = Math.min(minX, b.minX); minY = Math.min(minY, b.minY);
        maxX = Math.max(maxX, b.maxX); maxY = Math.max(maxY, b.maxY);
      }
    }
    if (maxX <= minX || maxY <= minY) throw new Error('capture appears blank across all frames');

    const PAD = 40; // was 12 — reference comparison showed our crop noticeably tighter/more cramped than intended
    minX = Math.max(0, minX - PAD); minY = Math.max(0, minY - PAD);
    maxX = Math.min(w, maxX + PAD); maxY = Math.min(h, maxY + PAD);
    const cropW = maxX - minX;
    let cropH = maxY - minY;

    // See renderBotStatic.html for the full rationale: anchor the name
    // header to the real head position instead of always sitting above
    // the FULL crop's top edge — a tall cosmetic (cape/wings/a glowing
    // helm) reaching higher than the head would otherwise pull the name up
    // to float above IT instead of the character's actual head.
    const NAME_SIZE = 22, GUILD_SIZE = 16, TEXT_GAP = 6, NAME_GAP_ABOVE_HEAD = 8;
    const headName = String(gear.strName || '').trim();
    const headGuildName = String(gear.guild || '').trim();
    const textBlockH = (headName ? NAME_SIZE + TEXT_GAP : 0) + (headGuildName ? GUILD_SIZE + TEXT_GAP : 0);
    if (headInfo) {
      const desiredMinY = headInfo.y - NAME_GAP_ABOVE_HEAD - textBlockH;
      if (desiredMinY < minY) {
        // Must stay an integer — see renderBotStatic.html's comment on the
        // exact crash this caused (fractional scan bounds silently break
        // every alpha-blob scan that follows). headInfo.y is already an
        // integer (decoded from an encoded byte pair), but the floor is a
        // cheap, harmless guarantee.
        minY = Math.max(0, Math.floor(desiredMinY));
        cropH = maxY - minY;
      }
    }

    const rigCenterXAbs = RigAvatar.RIG_CENTER_X * RigAvatar.RENDER_SCALE;

    // Pet repositioning — same reasoning as renderBotStatic.html: new_Game.as
    // places the pet at a fixed guess offset with no relation to its own art
    // bounds, so it ends up floating/misplaced by wildly different amounts
    // per pet. A simple x-threshold split was tried first but broke: a
    // downsized pet's body routinely extends into the character's own
    // head-scan window rather than staying outside it. Instead, OR the
    // alpha mask across every frame into one union mask (a pet doesn't move
    // frame-to-frame here, but its edges can flicker slightly, so unioning
    // keeps the detected blob consistent) and flood-fill THAT once — the
    // blob containing the rig's fixed center anchor is the character, the
    // largest other blob (if any) is the pet. That whole chunk (pet + its
    // rendered shadow — shadow fidelity isn't the concern, only position
    // is) is then cut out of every frame and redrawn butted against the
    // character's real left edge, grounded to the character's real foot
    // level.
    // Two separate thresholds, same reasoning as renderBotStatic.html: a
    // LOOSE mask (>10) finds the pet's full visible footprint (spikes, glow
    // halo, everything perceptible) so nothing gets clipped when it's cut
    // out and moved; a STRICT mask (>180) finds the character's real
    // perceptible left edge, since a weapon's glow/motion-trail fades to
    // near-zero alpha over a long tail that's still >10 and was connecting
    // the character's loose blob across the canvas past the pet's own
    // bounding box, corrupting charLeftX. Confirmed via a blob-bbox debug
    // overlay on the static harness.
    // Single-frame mask, NOT a union across all 48 — a union was the
    // original approach here, but it systematically inflates and can even
    // falsely FUSE a pet that's genuinely separate from the character in
    // every individual frame. Confirmed on Ryuu's Hellhound: its fire-tail
    // effect shifts position slightly frame to frame, so OR-ing every
    // frame's alpha together smears that motion into one big blob whose
    // footprint (measured 309x366) was nearly 3x the size any single frame
    // actually shows, and needed the strictest available threshold (200)
    // to split from the character at all — despite the two being cleanly
    // separated in any one frame, matching what renderBotStatic.html
    // (which only ever looks at one snapshot) correctly measures. Frame 0
    // is exactly the same kind of single-moment snapshot static uses, so
    // sizing/positioning now matches between the two paths. The resulting
    // crop/placement rectangle is still applied to every frame when
    // extracting the pet's actual pixels below, so the fire-tail's motion
    // across frames isn't lost — only the MEASUREMENT no longer double-
    // counts it.
    function buildMask(threshold) {
      const mask = new Uint8Array(w * h);
      const d = frames[0].data;
      for (let y = minY; y < maxY; y++) {
        for (let x = minX; x < maxX; x++) {
          const idx = y * w + x;
          if (d[idx * 4 + 3] > threshold) mask[idx] = 1;
        }
      }
      return mask;
    }
    function pickCharBlob(blobList) {
      let cb = null;
      for (const b of blobList) {
        if (b.minX <= rigCenterXAbs && rigCenterXAbs <= b.maxX) {
          if (!cb || b.count > cb.count) cb = b;
        }
      }
      if (!cb) { for (const b of blobList) { if (!cb || b.count > cb.count) cb = b; } }
      return cb;
    }
    const maskCache = { 10: buildMask(10), 180: buildMask(180) };
    function blobsAt(threshold) {
      if (!maskCache[threshold]) maskCache[threshold] = buildMask(threshold);
      const mask = maskCache[threshold];
      return RigAvatar.findAlphaBlobs((x, y) => mask[y * w + x] === 1, w, h, minX, minY, maxX, maxY);
    }

    let looseBlobs = blobsAt(10);
    let charBlobLoose = pickCharBlob(looseBlobs);
    let petBlob = null;
    for (const b of looseBlobs) {
      if (b === charBlobLoose || b.count < 200) continue;
      if (!petBlob || b.count > petBlob.count) petBlob = b;
    }
    // The API's own gear data tells us for certain whether a pet is
    // equipped, independent of pixel detection. A translucent/ghostly pet
    // can visually blend into the character (confirmed on "jase" — its
    // misty pet merged into one connected blob with the character at the
    // >10 threshold). When that happens but a pet IS equipped, progressively
    // raise the alpha cutoff — burning away only the faint low-alpha bridge,
    // not the pet's own solid body — until the two separate.
    const petExpected = !!(gear.strPetFile && gear.strPetFile !== 'none' && String(gear.strPetFile).trim() !== '');
    // A pet fused with the character (touching/overlapping at the loose
    // threshold) can leave only a small disconnected fragment as the sole
    // "other" blob, so `petBlob` is non-null but essentially garbage — same
    // fix as renderBotStatic.html (confirmed on Ryuu's Hellhound). Escalate
    // whenever the found petBlob looks implausibly small next to the
    // character too, not only when none is found, and across all attempted
    // thresholds keep whichever produces the LARGEST pet blob.
    const charArea = (charBlobLoose.maxX - charBlobLoose.minX) * (charBlobLoose.maxY - charBlobLoose.minY);
    const petBlobLooksTooSmall = petBlob && petBlob.count < charArea * 0.03;
    if ((!petBlob || petBlobLooksTooSmall) && petExpected) {
      for (const th of [30, 60, 100, 150, 180, 200]) {
        const tryBlobs = blobsAt(th);
        const tryChar = pickCharBlob(tryBlobs);
        let tryPet = null;
        for (const b of tryBlobs) {
          if (b === tryChar || b.count < 200) continue;
          if (!tryPet || b.count > tryPet.count) tryPet = b;
        }
        // tryChar can be null at some escalated thresholds (no blob happens
        // to contain the rig's center anchor at that exact cutoff) — never
        // let that null out an already-good charBlobLoose, only ever
        // improve it (confirmed crash on jase in the static path: "Cannot
        // read properties of null (reading 'maxX')" downstream once
        // charBlobLoose went null — same latent bug here).
        if (tryPet && (!petBlob || tryPet.count > petBlob.count)) {
          looseBlobs = tryBlobs; petBlob = tryPet;
          if (tryChar) charBlobLoose = tryChar;
        }
      }
    }
    const charBottomY = charBlobLoose.maxY;

    const charLeftX = pickCharBlob(blobsAt(180)).minX;

    // Restrict the head-slice scan to a window around the rig's fixed stage
    // anchor (not a pixel-derived value — it's a hardcoded constant in
    // new_Game.as, mirrored via RigAvatar.RIG_CENTER_X) rather than the full
    // crop width. A fixed-margin window alone isn't enough on its own —
    // confirmed on Ryuu's Hellhound, wide enough that even a generous AS3-
    // side placement gap still left it encroaching on that window. Now that
    // the character's own blob is already known (computed above), clamp
    // the window's left edge to charBlobLoose's own minX too — immune to
    // the pet's exact position regardless of how close it ends up, since
    // it's driven by the character's OWN real pixels, not a guessed gap.
    // headSliceMaxY used to be "30% of the TOTAL crop height" — broke once
    // the character/pet ground shadows were added, since those extend the
    // crop's overall height downward and shift where that 30% cutoff
    // lands, slicing through the (circular) halo ring off-center instead
    // of capturing it symmetrically. Anchoring the slice to the
    // character's own topmost content instead of a fraction of unrelated
    // total height (which a shadow, long weapon, or anything else below
    // the head can inflate) makes this immune to whatever else is in frame.
    const HEAD_WINDOW_MARGIN = 110 * RigAvatar.RENDER_SCALE;
    const headScanMinX = Math.max(minX, rigCenterXAbs - HEAD_WINDOW_MARGIN, charBlobLoose.minX);
    const headScanMaxX = Math.min(maxX, rigCenterXAbs + HEAD_WINDOW_MARGIN);
    let charTopY = maxY;
    for (const img of frames) {
      const b = alphaBBox(img.data, w, h, headScanMinX, minY, headScanMaxX, maxY);
      if (b.maxY > b.minY && b.minY < charTopY) charTopY = b.minY;
    }
    const HEAD_SLICE_HEIGHT = 130 * RigAvatar.RENDER_SCALE;
    const headSliceMaxY = Math.min(maxY, charTopY + HEAD_SLICE_HEIGHT);
    let headMinX = w, headMaxX = 0;
    for (const img of frames) {
      const b = alphaBBox(img.data, w, h, headScanMinX, minY, headScanMaxX, headSliceMaxY);
      if (b.maxX > b.minX) { headMinX = Math.min(headMinX, b.minX); headMaxX = Math.max(headMaxX, b.maxX); }
    }
    // Prefer the head beacon's own X (see RigAvatar.readHeadInfoBeacons)
    // over the pixel-scan result above — see renderBotStatic.html for the
    // full rationale (that scan's window is only clamped against a pet/cape
    // on its LEFT edge, biasing the center rightward whenever one sits to
    // the character's left, confirmed on Prime and Ryuu). Falls back to the
    // old pixel-scan result if the beacon is somehow missing.
    const headCenterX = headInfo ? (headInfo.x - minX)
      : (headMaxX > headMinX ? (headMinX + headMaxX) / 2 - minX : cropW / 2);

    const hasPet = petBlob !== null;
    let petDrawXBase = 0, petDrawYBase = 0, petDrawW = 0, petDrawH = 0, petW = 0, petH = 0, petMinX = 0, petMinY = 0, petMaxX = 0, petMaxY = 0;
    let scanMinX = 0, scanMinY = 0, scanMaxX = 0, scanMaxY = 0;
    let petFrameResults = [];
    // Some pets (confirmed on "smokecity") are a large diffuse atmospheric
    // effect that visually reads as ONE continuous cloud with the character's
    // own effects, but is only barely, formally disconnected from the
    // character's blob by a near-invisible dip in alpha (imperceptible to
    // the eye, e.g. alpha 9 vs 11, enough to break 8-connectivity at our >10
    // threshold). Per-pixel masking correctly grabs exactly that
    // disconnected "pet" component and relocates it beside the character —
    // but because the eye reads the un-relocated remainder (still attached
    // to the character's own blob) as part of the SAME cloud, moving only
    // half of it creates an obvious seam no masking precision can avoid.
    // The windowed fusion-ratio check further below can't catch this either
    // — the scan window itself truncates the flood-filled blob's measured
    // area right where it hits the window edge, so a truly enormous blob
    // reads as artificially small (confirmed: petFrameBlob's bbox landed
    // exactly on scanMaxX/scanMaxY on this character, i.e. already clipped
    // by the window before the ratio check ever saw its true size). Catch
    // it here instead, using the UNWINDOWED bbox overlap between the pet
    // and the character (not subject to that truncation) — if a large
    // fraction of the pet's own bbox already overlaps the character's,
    // treat this as "don't relocate" from the start.
    const bboxOverlapX = hasPet ? Math.max(0, Math.min(petBlob.maxX, charBlobLoose.maxX) - Math.max(petBlob.minX, charBlobLoose.minX)) : 0;
    const bboxOverlapY = hasPet ? Math.max(0, Math.min(petBlob.maxY, charBlobLoose.maxY) - Math.max(petBlob.minY, charBlobLoose.minY)) : 0;
    const petBboxArea = hasPet ? (petBlob.maxX - petBlob.minX + 1) * (petBlob.maxY - petBlob.minY + 1) : 0;
    const PET_CHAR_OVERLAP_SKIP_FRACTION = 0.15;
    const petOverlapsCharacterTooMuch = hasPet && (bboxOverlapX * bboxOverlapY) / petBboxArea > PET_CHAR_OVERLAP_SKIP_FRACTION;
    if (hasPet && !petOverlapsCharacterTooMuch) {
      // petBlob above is deliberately measured from frame 0 alone (see the
      // buildMask comment) so pet/character separation can't be fooled by
      // motion smear. But the pet DOES move/animate frame to frame (fire
      // tail, ear/horn flicker, etc.), so using frame 0's box alone as the
      // CUT/EXTRACT rectangle leaves any part that pokes outside that box
      // in later frames un-cleared from srcCanvas and un-captured into
      // petCanvas — it's left behind at the pet's ORIGINAL (pre-
      // reposition) on-screen spot instead of moving with the rest of its
      // body, showing up as a disconnected fragment floating near the
      // character. Fix: now that frame 0 has established the pet sits
      // strictly left of the character, union the true alpha bounds across
      // EVERY frame within a window capped at the character's own
      // loose-blob edge (+ a small buffer past the frame-0 pet box) — that
      // cap can never include real character pixels, so this can't
      // reintroduce the motion-smear false-fusion problem the frame-0
      // restriction above was fixing in the first place.
      // Bounded padding around the frame-0 box, NOT an open corridor to
      // charBlobLoose.minX — an open corridor swept in an unrelated element
      // (a separate cape/back-item whose own animation drifts through the
      // gap between pet and character on this character) as if it were
      // part of the pet. Also never shrink below petBlob's own already-
      // validated frame-0 extent — an open corridor capped at
      // charBlobLoose.minX could clip the pet's own right edge whenever the
      // two blobs' bounding boxes happen to overlap in X despite being
      // separate connected components (confirmed: petBlob.maxX exceeded
      // charBlobLoose.minX here).
      const PET_SCAN_PAD = 60 * RigAvatar.RENDER_SCALE;
      scanMinX = Math.max(minX, petBlob.minX - PET_SCAN_PAD);
      scanMinY = Math.max(minY, petBlob.minY - PET_SCAN_PAD);
      scanMaxX = Math.max(petBlob.maxX, Math.min(charBlobLoose.minX, petBlob.maxX + PET_SCAN_PAD));
      scanMaxY = Math.min(maxY, petBlob.maxY + PET_SCAN_PAD);
      // A raw "any alpha pixel in this rectangle" scan (alphaBBox) is wrong
      // whenever the pet's and character's frame-0 bounding boxes overlap in
      // X even slightly (confirmed on Ryuu: petBlob.maxX=665 already exceeds
      // charBlobLoose.minX=650 at frame 0, a real but separate-blob overlap
      // the comment above already calls out) — the scan window then also
      // catches the character's OWN cape/wing pixels sitting in that shared
      // column in every frame, inflating petMinY far above the pet's real
      // top (measured 431 vs. the pet's true frame-0 top of 543) and
      // clearRect-ing a rectangular notch straight out of the character's
      // wing. Flood-filling per frame and keeping only the connected
      // component that touches the pet's known frame-0 centroid narrows
      // this (431 -> 449) but doesn't fully fix it: the pet's glow and the
      // cape's glow genuinely TOUCH at low alpha within the scan window on
      // this character, so they flood-fill as ONE fused blob there, and
      // that fused blob's bounding box still includes real character
      // pixels. A bounding box can never solve this on its own — the
      // eventual clear/copy below uses each frame's actual pixel MASK
      // (petFrameResults), not this bbox, so only genuinely pet-owned
      // pixels ever get cut out. This union bbox now exists solely to size
      // and position the extracted pet's canvas/placement.
      const petSeedX = (petBlob.minX + petBlob.maxX) / 2;
      const petSeedY = (petBlob.minY + petBlob.maxY) / 2;
      // A pet's own fire/particle FX (embers, fire-tail flicker) can be a
      // fully separate connected component from its main body in any given
      // frame — confirmed on Ryuu's Hellhound, small ember streaks that
      // don't touch the seed-connected blob. Restricting to ONLY the blob
      // touching the seed left those behind at their original on-screen
      // spot instead of moving with the pet (the exact bug the frame-union
      // logic here was originally built to fix). So: keep every blob in the
      // scan window EXCEPT ones that overlap the character's own frame-0
      // footprint (charBlobLoose, padded slightly) — those are (or touch)
      // real character content and must never be swept up, but anything
      // else floating in this window is safe to treat as the pet's.
      const CHAR_TOUCH_PAD = 4 * RigAvatar.RENDER_SCALE;
      const charPadMinX = charBlobLoose.minX - CHAR_TOUCH_PAD, charPadMinY = charBlobLoose.minY - CHAR_TOUCH_PAD;
      const charPadMaxX = charBlobLoose.maxX + CHAR_TOUCH_PAD, charPadMaxY = charBlobLoose.maxY + CHAR_TOUCH_PAD;
      function touchesCharacter(b) {
        return !(b.maxX < charPadMinX || b.minX > charPadMaxX || b.maxY < charPadMinY || b.minY > charPadMaxY);
      }
      // Some pets visually overlap the character/cape on screen (not just
      // touch at a thin edge) at certain points in their own animation —
      // confirmed on SmokeCity, whose translucent ghost pet passes directly
      // across ~160x270px of the cape's own silhouette in the loop's first
      // few frames. When that happens, the seed-connected blob genuinely
      // IS a fusion of pet + a large piece of cape — there's no pixel-level
      // trick that recovers "just the pet" from a frame where the two are
      // rendered overlapping, because they really are the same connected
      // shape there. Detect this by comparing the seed blob's per-frame
      // area against its known frame-0 size: a legitimate pet's silhouette
      // doesn't balloon several times larger frame to frame, so a big jump
      // means real character content got swallowed. On those specific
      // frames, skip extraction entirely (leave srcCanvas untouched so the
      // cape stays intact, pet simply isn't moved to its usual redrawn slot
      // for that one frame) rather than ship a guaranteed-wrong cut.
      const petBlobFrame0Area = (petBlob.maxX - petBlob.minX + 1) * (petBlob.maxY - petBlob.minY + 1);
      const FUSION_AREA_RATIO = 2.2;
      let uMinX = w, uMinY = h, uMaxX = 0, uMaxY = 0;
      petFrameResults = [];
      for (const img of frames) {
        const d = img.data;
        const alphaAt = (x, y) => d[(y * w + x) * 4 + 3] > 10;
        const allBlobs = RigAvatar.findAlphaBlobs(alphaAt, w, h, scanMinX, scanMinY, scanMaxX, scanMaxY);
        let petFrameBlob = null;
        for (const b of allBlobs) {
          if (b.minX <= petSeedX && petSeedX <= b.maxX && b.minY <= petSeedY && petSeedY <= b.maxY) {
            if (!petFrameBlob || b.count > petFrameBlob.count) petFrameBlob = b;
          }
        }
        if (petFrameBlob) {
          const pfArea = (petFrameBlob.maxX - petFrameBlob.minX + 1) * (petFrameBlob.maxY - petFrameBlob.minY + 1);
          if (pfArea > petBlobFrame0Area * FUSION_AREA_RATIO) petFrameBlob = null;
        }
        const scanW = scanMaxX - scanMinX, scanH = scanMaxY - scanMinY;
        const combinedMask = new Uint8Array(scanW * scanH);
        let cMinX = w, cMinY = h, cMaxX = 0, cMaxY = 0;
        let any = false;
        function includeBlob(b) {
          const bres = floodFillBlobMask(alphaAt, w, h, scanMinX, scanMinY, scanMaxX, scanMaxY, (b.minX + b.maxX) / 2, (b.minY + b.maxY) / 2);
          if (!bres) return;
          for (let i = 0; i < bres.mask.length; i++) if (bres.mask[i]) combinedMask[i] = 1;
          cMinX = Math.min(cMinX, bres.minX); cMinY = Math.min(cMinY, bres.minY);
          cMaxX = Math.max(cMaxX, bres.maxX); cMaxY = Math.max(cMaxY, bres.maxY);
          any = true;
        }
        // The seed-connected blob IS the pet's main body — always include it
        // even when it touches the character (per-pixel masking already
        // limits the damage to the thin actual touch point, not a
        // rectangle). Only apply the "must not touch character" filter to
        // OTHER, separate blobs floating in the same window (candidate
        // ember/particle fragments) — never to the main body itself.
        if (petFrameBlob) includeBlob(petFrameBlob);
        for (const b of allBlobs) {
          if (b === petFrameBlob || touchesCharacter(b)) continue;
          includeBlob(b);
        }
        const res = (petFrameBlob && any) ? { mask: combinedMask, minX: cMinX, minY: cMinY, maxX: cMaxX, maxY: cMaxY } : null;
        petFrameResults.push(res);
        if (!res) continue;
        uMinX = Math.min(uMinX, res.minX); uMinY = Math.min(uMinY, res.minY);
        uMaxX = Math.max(uMaxX, res.maxX); uMaxY = Math.max(uMaxY, res.maxY);
      }
      petMinX = uMinX; petMinY = uMinY; petMaxX = uMaxX; petMaxY = uMaxY;
      petW = petMaxX - petMinX + 1; petH = petMaxY - petMinY + 1;

      // Universal pet-size correction — see renderBotStatic.html for the
      // full rationale. AS3's getBounds()-based fit is proven unreliable
      // per-pet (glow/filter bleed underestimates true size), so clamp the
      // pet's TRUE measured pixel footprint against the character's own
      // measured height instead of trusting AS3's guess.
      const characterHeightPx = charBottomY - charTopY;
      const maxPetHeightPx = characterHeightPx * 0.7;
      const maxPetWidthPx = characterHeightPx * 0.65;
      const petRescale = Math.min(1, maxPetHeightPx / petH, maxPetWidthPx / petW);
      petDrawW = petW * petRescale;
      petDrawH = petH * petRescale;

      const PET_OVERLAP = 10 * RigAvatar.RENDER_SCALE;
      petDrawXBase = (charLeftX + PET_OVERLAP) - minX - petDrawW;
      petDrawYBase = charBottomY - minY - petDrawH;
    }

    const name = headName;
    const guildName = headGuildName;
    const TOP_MARGIN = 10;

    // See renderBotStatic.html for the full rationale. Fallback (beacon
    // somehow missing) reproduces the old dedicated-strip behavior exactly.
    let headerH = 0, textAnchorY;
    if (headInfo) {
      textAnchorY = (headInfo.y - minY) - NAME_GAP_ABOVE_HEAD - textBlockH;
    } else {
      headerH = textBlockH + (name || guildName ? TOP_MARGIN : 0);
      textAnchorY = TOP_MARGIN;
    }

    function drawLabel(octx, text, y, size) {
      octx.font = `bold ${size}px ${textStyle.font}`;
      octx.textAlign = 'center';
      octx.textBaseline = 'top';
      octx.lineWidth = Math.max(2, size / 8);
      octx.strokeStyle = colorTheme.stroke;
      octx.strokeText(text, headCenterX, y);
      octx.fillStyle = colorTheme.color;
      octx.fillText(text, headCenterX, y);
    }

    // Composite each frame (header text + cropped character) into its own
    // canvas and hand back a data URL — encoding into an actual GIF happens
    // Node-side (gifenc), not here.
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = w; srcCanvas.height = h;
    const srcCtx = srcCanvas.getContext('2d');

    const out = document.createElement('canvas');
    out.width = cropW;
    out.height = cropH + headerH;
    const octx = out.getContext('2d');

    // hasPet alone isn't enough here — a pet flagged as overlapping the
    // character too much (see above) never gets its scan/measurement block
    // run, so petW/petH stay 0. drawImage from a 0x0 source canvas throws
    // (InvalidStateError), so gate the pet canvas/draw path on whether
    // extraction was actually attempted, not just whether a pet exists.
    const petUsable = hasPet && !petOverlapsCharacterTooMuch;
    const petCanvas = petUsable ? document.createElement('canvas') : null;
    if (petUsable) { petCanvas.width = petW; petCanvas.height = petH; }
    const petCtx = petUsable ? petCanvas.getContext('2d') : null;

    const dataUrls = [];
    const scanW = petUsable ? (scanMaxX - scanMinX) : 0;
    for (let fi = 0; fi < frames.length; fi++) {
      const img = frames[fi];
      srcCtx.putImageData(img, 0, 0);
      octx.clearRect(0, 0, out.width, out.height);

      if (petUsable) {
        petCtx.clearRect(0, 0, petW, petH);
        // Cut only the pet's actual masked pixels out of the character
        // canvas, not the whole petMinX/Y..petMaxX/Y rectangle — that
        // rectangle can (and on this character does) contain real
        // character content, see the measurement-loop comment above.
        const res = petFrameResults[fi];
        if (res) {
          const region = srcCtx.getImageData(petMinX, petMinY, petW, petH);
          const petOut = petCtx.createImageData(petW, petH);
          for (let y = 0; y < petH; y++) {
            const gy = petMinY + y;
            if (gy < scanMinY || gy >= scanMaxY) continue;
            for (let x = 0; x < petW; x++) {
              const gx = petMinX + x;
              if (gx < scanMinX || gx >= scanMaxX) continue;
              if (!res.mask[(gy - scanMinY) * scanW + (gx - scanMinX)]) continue;
              const di = (y * petW + x) * 4;
              petOut.data[di] = region.data[di];
              petOut.data[di + 1] = region.data[di + 1];
              petOut.data[di + 2] = region.data[di + 2];
              petOut.data[di + 3] = region.data[di + 3];
              region.data[di + 3] = 0;
            }
          }
          petCtx.putImageData(petOut, 0, 0);
          srcCtx.putImageData(region, petMinX, petMinY);
        }
      }

      octx.drawImage(srcCanvas, minX, minY, cropW, cropH, 0, headerH, cropW, cropH);
      if (petUsable) {
        octx.drawImage(petCanvas, petDrawXBase, petDrawYBase + headerH, petDrawW, petDrawH);
      }

      let textY = textAnchorY;
      if (name)      { drawLabel(octx, name, textY, NAME_SIZE); textY += NAME_SIZE + TEXT_GAP; }
      if (guildName) { drawLabel(octx, '[' + guildName + ']', textY, GUILD_SIZE); }

      dataUrls.push(out.toDataURL('image/png'));
    }

    window.__renderFrames = dataUrls;
    window.__renderReady = true;
  } catch (err) {
    window.__renderError = String(err && err.message || err);
  }
}
run();
</script>
</body>
</html>
