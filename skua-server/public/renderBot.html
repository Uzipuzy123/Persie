<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Bot render harness</title>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = { autoplay: 'on', unmuteOverlay: 'hidden', warnOnUnsupportedContent: false, splashScreen: false };
</script>
<script src="/ruffle/ruffle.js"></script>
<script src="/rigAvatar.js"></script>
<style>
  html, body { background: #2f3136; margin: 0; padding: 0; } /* Discord's own dark bg, so the GIF blends in */
  #viewport { width: 300px; height: 300px; overflow: hidden; position: relative; }
  #rig-container { position: relative; }
</style>
</head>
<body>
<div id="viewport"><div id="rig-container"></div></div>
<script>
// Headless-driven: username comes from the query string, and
// window.__renderReady flips true once the rig is built and the emote is
// playing — Puppeteer waits on that flag instead of a fixed timeout, since
// captureFullBody's own Ruffle-load time isn't constant.
window.__renderReady = false;
window.__renderError = null;

async function run() {
  try {
    const params = new URLSearchParams(location.search);
    const username = params.get('username');
    if (!username) throw new Error('no username in query string');

    const res = await fetch('/api/avatar?username=' + encodeURIComponent(username));
    if (!res.ok) throw new Error('avatar API ' + res.status);
    const { flashvars: gear } = await res.json();

    const { canvas: fullCanvas, ready } = await RigAvatar.captureFullBody(gear);
    window.__debugFullCanvas = fullCanvas.toDataURL('image/png');
    window.__debugBeaconReady = ready;
    const slices = RigAvatar.sliceParts(fullCanvas);
    const container = document.getElementById('rig-container');
    const { elements } = RigAvatar.buildRigDom(container, slices);

    // Same crop-and-scale framing as rigtest.html, tuned to fill the 300x300
    // viewport instead of rigtest's 320x320 comparison box.
    const SCALE = 2.0;
    container.style.transform = `scale(${SCALE}) translate(-100px, -170px)`;
    container.style.transformOrigin = '0 0';

    RigAvatar.playWinEmote(container, elements);
    window.__renderReady = true;
  } catch (err) {
    window.__renderError = String(err && err.message || err);
  }
}
run();
</script>
</body>
</html>
