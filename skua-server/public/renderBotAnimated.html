<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Bot animated render harness</title>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = { autoplay: 'on', unmuteOverlay: 'hidden', warnOnUnsupportedContent: false, splashScreen: false };
</script>
<script src="/ruffle/ruffle.js"></script>
<script src="/rigAvatar.js"></script>
</head>
<body style="margin:0">
<script>
// Same static crop + Canvas-2D name/guild header as renderBotStatic.html,
// just repeated per captured frame so a weapon's own native shine/glow loop
// (baked into its SWF timeline, not anything we animate ourselves) actually
// plays instead of freezing on frame 1. No rig-slicing/joint puppeteering
// here — that's the animation approach that looked "off" and was dropped.
window.__renderReady = false;
window.__renderError = null;
window.__renderFrames = null; // array of PNG data URLs, same dimensions

function alphaBBox(data, w, h, x0, y0, x1, y1) {
  let minX = x1, minY = y1, maxX = x0, maxY = y0;
  for (let y = y0; y < y1; y++) {
    for (let x = x0; x < x1; x++) {
      if (data[(y * w + x) * 4 + 3] > 10) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  return { minX, minY, maxX, maxY };
}

async function run() {
  try {
    const params = new URLSearchParams(location.search);
    const username = params.get('username');
    if (!username) throw new Error('no username in query string');

    const res = await fetch('/api/avatar?username=' + encodeURIComponent(username));
    if (!res.ok) throw new Error('avatar API ' + res.status);
    const { flashvars: gear } = await res.json();

    // Sampling at Ruffle's own native 24fps (rather than the earlier 10fps)
    // so the weapon's shine motion reads as smooth instead of choppy —
    // still ~2s total, just 48 frames instead of 20 to cover it.
    const FRAME_COUNT = 48, INTERVAL_MS = Math.round(1000 / 24);
    const { frames, width: w, height: h, ready } = await RigAvatar.captureAnimatedFramesDualKey(gear, { frameCount: FRAME_COUNT, intervalMs: INTERVAL_MS });
    if (!ready) throw new Error('character never became ready (gear failed to load in time)');
    if (!frames.length) throw new Error('no frames captured');

    // Blank the ready-beacon corner on every frame before scanning bounds,
    // same reasoning as the static harness.
    for (const img of frames) {
      const d = img.data;
      for (let y = 0; y < 100; y++) {
        for (let x = 0; x < 100; x++) { d[(y * w + x) * 4 + 3] = 0; }
      }
    }

    // Union the alpha bounding box (and the head-slice sub-box used for text
    // centering) ACROSS ALL FRAMES, not per-frame — a per-frame box would
    // jitter the crop/text position slightly as shine pixels flicker near
    // the silhouette edge from frame to frame.
    let minX = w, minY = h, maxX = 0, maxY = 0;
    for (const img of frames) {
      const b = alphaBBox(img.data, w, h, 0, 0, w, h);
      if (b.maxX > b.minX && b.maxY > b.minY) {
        minX = Math.min(minX, b.minX); minY = Math.min(minY, b.minY);
        maxX = Math.max(maxX, b.maxX); maxY = Math.max(maxY, b.maxY);
      }
    }
    if (maxX <= minX || maxY <= minY) throw new Error('capture appears blank across all frames');

    const PAD = 40; // was 12 — reference comparison showed our crop noticeably tighter/more cramped than intended
    minX = Math.max(0, minX - PAD); minY = Math.max(0, minY - PAD);
    maxX = Math.min(w, maxX + PAD); maxY = Math.min(h, maxY + PAD);
    const cropW = maxX - minX, cropH = maxY - minY;

    // Restrict the head-slice scan to a window around the rig's fixed
    // stage anchor (not a pixel-derived value — it's a hardcoded constant
    // in new_Game.as, mirrored via RigAvatar.RIG_CENTER_X) rather than the
    // full crop width. Without this, a pet positioned at chest height
    // beside the character (opposite the weapon hand) overlaps the same
    // top slice and pulls headCenterX toward the pet instead of the
    // actual character — same fix as renderBotStatic.html.
    // headSliceMaxY used to be "30% of the TOTAL crop height" — broke once
    // the character/pet ground shadows were added, since those extend the
    // crop's overall height downward and shift where that 30% cutoff
    // lands, slicing through the (circular) halo ring off-center instead
    // of capturing it symmetrically. Anchoring the slice to the
    // character's own topmost content instead of a fraction of unrelated
    // total height (which a shadow, long weapon, or anything else below
    // the head can inflate) makes this immune to whatever else is in frame.
    const HEAD_WINDOW_MARGIN = 110 * RigAvatar.RENDER_SCALE;
    const rigCenterXAbs = RigAvatar.RIG_CENTER_X * RigAvatar.RENDER_SCALE;
    const headScanMinX = Math.max(minX, rigCenterXAbs - HEAD_WINDOW_MARGIN);
    const headScanMaxX = Math.min(maxX, rigCenterXAbs + HEAD_WINDOW_MARGIN);
    let charTopY = maxY;
    for (const img of frames) {
      const b = alphaBBox(img.data, w, h, headScanMinX, minY, headScanMaxX, maxY);
      if (b.maxY > b.minY && b.minY < charTopY) charTopY = b.minY;
    }
    const HEAD_SLICE_HEIGHT = 130 * RigAvatar.RENDER_SCALE;
    const headSliceMaxY = Math.min(maxY, charTopY + HEAD_SLICE_HEIGHT);
    let headMinX = w, headMaxX = 0;
    for (const img of frames) {
      const b = alphaBBox(img.data, w, h, headScanMinX, minY, headScanMaxX, headSliceMaxY);
      if (b.maxX > b.minX) { headMinX = Math.min(headMinX, b.minX); headMaxX = Math.max(headMaxX, b.maxX); }
    }
    const headCenterX = headMaxX > headMinX ? (headMinX + headMaxX) / 2 - minX : cropW / 2;

    // Pet repositioning — same reasoning as renderBotStatic.html: new_Game.as
    // places the pet at a fixed guess offset with no relation to its own art
    // bounds, so it ends up floating/misplaced by wildly different amounts
    // per pet. A simple x-threshold split was tried first but broke: a
    // downsized pet's body routinely extends into the character's own
    // head-scan window rather than staying outside it. Instead, OR the
    // alpha mask across every frame into one union mask (a pet doesn't move
    // frame-to-frame here, but its edges can flicker slightly, so unioning
    // keeps the detected blob consistent) and flood-fill THAT once — the
    // blob containing the rig's fixed center anchor is the character, the
    // largest other blob (if any) is the pet. That whole chunk (pet + its
    // rendered shadow — shadow fidelity isn't the concern, only position
    // is) is then cut out of every frame and redrawn butted against the
    // character's real left edge, grounded to the character's real foot
    // level.
    // Two separate thresholds, same reasoning as renderBotStatic.html: a
    // LOOSE mask (>10) finds the pet's full visible footprint (spikes, glow
    // halo, everything perceptible) so nothing gets clipped when it's cut
    // out and moved; a STRICT mask (>180) finds the character's real
    // perceptible left edge, since a weapon's glow/motion-trail fades to
    // near-zero alpha over a long tail that's still >10 and was connecting
    // the character's loose blob across the canvas past the pet's own
    // bounding box, corrupting charLeftX. Confirmed via a blob-bbox debug
    // overlay on the static harness.
    function buildMask(threshold) {
      const mask = new Uint8Array(w * h);
      for (const img of frames) {
        const d = img.data;
        for (let y = minY; y < maxY; y++) {
          for (let x = minX; x < maxX; x++) {
            const idx = y * w + x;
            if (!mask[idx] && d[idx * 4 + 3] > threshold) mask[idx] = 1;
          }
        }
      }
      return mask;
    }
    function pickCharBlob(blobList) {
      let cb = null;
      for (const b of blobList) {
        if (b.minX <= rigCenterXAbs && rigCenterXAbs <= b.maxX) {
          if (!cb || b.count > cb.count) cb = b;
        }
      }
      if (!cb) { for (const b of blobList) { if (!cb || b.count > cb.count) cb = b; } }
      return cb;
    }
    const maskCache = { 10: buildMask(10), 180: buildMask(180) };
    function blobsAt(threshold) {
      if (!maskCache[threshold]) maskCache[threshold] = buildMask(threshold);
      const mask = maskCache[threshold];
      return RigAvatar.findAlphaBlobs((x, y) => mask[y * w + x] === 1, w, h, minX, minY, maxX, maxY);
    }

    let looseBlobs = blobsAt(10);
    let charBlobLoose = pickCharBlob(looseBlobs);
    let petBlob = null;
    for (const b of looseBlobs) {
      if (b === charBlobLoose || b.count < 200) continue;
      if (!petBlob || b.count > petBlob.count) petBlob = b;
    }
    // The API's own gear data tells us for certain whether a pet is
    // equipped, independent of pixel detection. A translucent/ghostly pet
    // can visually blend into the character (confirmed on "jase" — its
    // misty pet merged into one connected blob with the character at the
    // >10 threshold). When that happens but a pet IS equipped, progressively
    // raise the alpha cutoff — burning away only the faint low-alpha bridge,
    // not the pet's own solid body — until the two separate.
    const petExpected = !!(gear.strPetFile && gear.strPetFile !== 'none' && String(gear.strPetFile).trim() !== '');
    if (!petBlob && petExpected) {
      for (const th of [30, 60, 100, 150, 180, 200]) {
        const tryBlobs = blobsAt(th);
        const tryChar = pickCharBlob(tryBlobs);
        let tryPet = null;
        for (const b of tryBlobs) {
          if (b === tryChar || b.count < 200) continue;
          if (!tryPet || b.count > tryPet.count) tryPet = b;
        }
        if (tryPet) { looseBlobs = tryBlobs; charBlobLoose = tryChar; petBlob = tryPet; break; }
      }
    }
    const charBottomY = charBlobLoose.maxY;

    const charLeftX = pickCharBlob(blobsAt(180)).minX;

    const hasPet = petBlob !== null;
    let petDrawXBase = 0, petDrawYBase = 0, petW = 0, petH = 0, petMinX = 0, petMinY = 0, petMaxX = 0, petMaxY = 0;
    if (hasPet) {
      petMinX = petBlob.minX; petMinY = petBlob.minY; petMaxX = petBlob.maxX; petMaxY = petBlob.maxY;
      petW = petMaxX - petMinX + 1; petH = petMaxY - petMinY + 1;
      const PET_OVERLAP = 10 * RigAvatar.RENDER_SCALE;
      const petDX = (charLeftX + PET_OVERLAP) - petMaxX;
      const petDY = charBottomY - petMaxY;
      petDrawXBase = (petMinX + petDX) - minX;
      petDrawYBase = (petMinY + petDY) - minY;
    }

    const name = String(gear.strName || '').trim();
    const guildName = String(gear.guild || '').trim();
    const NAME_SIZE = 22, GUILD_SIZE = 16, TEXT_GAP = 6, TOP_MARGIN = 10;
    const headerH = (name ? NAME_SIZE + TEXT_GAP : 0) + (guildName ? GUILD_SIZE + TEXT_GAP : 0) + (name || guildName ? TOP_MARGIN : 0);

    function drawLabel(octx, text, y, size, color) {
      octx.font = `bold ${size}px sans-serif`;
      octx.textAlign = 'center';
      octx.textBaseline = 'top';
      octx.lineWidth = Math.max(2, size / 8);
      octx.strokeStyle = 'rgba(0,0,0,0.85)';
      octx.strokeText(text, headCenterX, y);
      octx.fillStyle = color;
      octx.fillText(text, headCenterX, y);
    }

    // Composite each frame (header text + cropped character) into its own
    // canvas and hand back a data URL — encoding into an actual GIF happens
    // Node-side (gifenc), not here.
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = w; srcCanvas.height = h;
    const srcCtx = srcCanvas.getContext('2d');

    const out = document.createElement('canvas');
    out.width = cropW;
    out.height = cropH + headerH;
    const octx = out.getContext('2d');

    // Character's own ground shadow — same reasoning/position logic as
    // renderBotStatic.html, computed once (charBottomY is already a union
    // across all frames) and drawn identically into every frame.
    const charShadowX = rigCenterXAbs - minX;
    const charShadowY = (charBottomY - minY) + headerH - 8 * RigAvatar.RENDER_SCALE;

    const petCanvas = hasPet ? document.createElement('canvas') : null;
    if (hasPet) { petCanvas.width = petW; petCanvas.height = petH; }
    const petCtx = hasPet ? petCanvas.getContext('2d') : null;

    const dataUrls = [];
    for (const img of frames) {
      srcCtx.putImageData(img, 0, 0);
      octx.clearRect(0, 0, out.width, out.height);

      let textY = TOP_MARGIN;
      if (name)      { drawLabel(octx, name, textY, NAME_SIZE, '#ffffff'); textY += NAME_SIZE + TEXT_GAP; }
      if (guildName) { drawLabel(octx, '[' + guildName + ']', textY, GUILD_SIZE, '#ffd966'); }

      octx.save();
      octx.globalAlpha = 0.35;
      octx.fillStyle = '#000000';
      octx.beginPath();
      octx.ellipse(charShadowX, charShadowY, 55 * RigAvatar.RENDER_SCALE, 16 * RigAvatar.RENDER_SCALE, 0, 0, Math.PI * 2);
      octx.fill();
      octx.restore();

      if (hasPet) {
        petCtx.clearRect(0, 0, petW, petH);
        petCtx.putImageData(srcCtx.getImageData(petMinX, petMinY, petW, petH), 0, 0);
        srcCtx.clearRect(petMinX, petMinY, petW, petH);
      }

      octx.drawImage(srcCanvas, minX, minY, cropW, cropH, 0, headerH, cropW, cropH);
      if (hasPet) {
        octx.drawImage(petCanvas, petDrawXBase, petDrawYBase + headerH);
      }
      dataUrls.push(out.toDataURL('image/png'));
    }

    window.__renderFrames = dataUrls;
    window.__renderReady = true;
  } catch (err) {
    window.__renderError = String(err && err.message || err);
  }
}
run();
</script>
</body>
</html>
